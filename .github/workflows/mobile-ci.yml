name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths: ["mobile/**"]
  pull_request:
    branches: [main, develop]
    paths: ["mobile/**"]

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: cd mobile && npm install

      - name: Type check user app
        run: cd mobile/apps/user && npx tsc --noEmit

      - name: Type check rider app
        run: cd mobile/apps/rider && npx tsc --noEmit
